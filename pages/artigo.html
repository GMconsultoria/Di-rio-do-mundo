<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artigo | Diário do Mundo</title>
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .article-header { margin-bottom: 30px; }
        .article-header h1 { font-size: 42px; line-height: 1.2; margin-bottom: 15px; }
        .article-header h2 { font-size: 22px; color: #666; font-weight: normal; margin-bottom: 20px; }
        .article-meta { font-size: 14px; color: #888; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 10px 0; margin-bottom: 30px; }
        .featured-image { width: 100%; height: auto; border-radius: 8px; margin-bottom: 30px; }
        .article-content p { font-size: 18px; margin-bottom: 25px; color: #333; }
        .article-content h2, .article-content h3 { margin: 40px 0 20px; }
        .share-buttons { display: flex; gap: 10px; margin: 40px 0; }
        .share-btn { padding: 10px 20px; border-radius: 4px; color: white; font-weight: bold; font-size: 14px; }
        .btn-whatsapp { background-color: #25D366; }
        .btn-facebook { background-color: #1877F2; }
        .btn-twitter { background-color: #1DA1F2; }
        .related-news { margin-top: 60px; padding-top: 40px; border-top: 2px solid #eee; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="ad-container ad-top">
        <div class="ad-placeholder">Anúncio - Publicidade</div>
    </div>

    <header>
        <div class="container header-content">
            <div class="logo">
                <a href="../index.html">Diário do <span>Mundo</span></a>
            </div>
            <nav>
                <ul>
                    <li><a href="categoria.html?cat=politica">Política</a></li>
                    <li><a href="categoria.html?cat=economia">Economia</a></li>
                    <li><a href="categoria.html?cat=investimentos">Investimentos</a></li>
                    <li><a href="categoria.html?cat=tecnologia">Ciência e Tecnologia</a></li>
                    <li><a href="categoria.html?cat=curiosidade">Curiosidade</a></li>
                </ul>
            </nav>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar notícias...">
                <button id="searchBtn">🔍</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="content-wrapper" id="articleContainer">
            <!-- Renderizado via JS -->
        </div>

        <aside class="sidebar-ads">
            <div class="ad-vertical">
                <div class="ad-placeholder">Anúncio Lateral</div>
            </div>
        </aside>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-logo">Diário do Mundo</div>
            <p>&copy; 2026 Diário do Mundo - Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/render.js"></script>
    <script src="../js/search.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            const container = document.getElementById('articleContainer');
            
            const noticia = window.noticias.find(n => n.id === id);
            
            if (noticia) {
                document.title = `${noticia.titulo} | Diário do Mundo`;
                container.innerHTML = `
                    <article class="full-article">
                        <header class="article-header">
                            <span class="category-tag">${noticia.categoriaNome}</span>
                            <h1>${noticia.titulo}</h1>
                            <h2>${noticia.resumo}</h2>
                            <div class="article-meta">
                                Por <strong>${noticia.autor}</strong> | Publicado em ${noticia.data}
                            </div>
                        </header>
                        <div class="ad-container"><div class="ad-placeholder">Anúncio - Publicidade</div></div>
                        <img src="../${noticia.imagem}" alt="${noticia.titulo}" class="featured-image">
                        <div class="article-content">${noticia.conteudo}</div>
                        <div class="share-buttons">
                            <a href="#" class="share-btn btn-whatsapp">WhatsApp</a>
                            <a href="#" class="share-btn btn-facebook">Facebook</a>
                            <a href="#" class="share-btn btn-twitter">Twitter</a>
                        </div>
                        <div class="ad-container"><div class="ad-placeholder">Anúncio - Publicidade Final</div></div>
                    </article>
                `;
            } else {
                container.innerHTML = "<h1>Notícia não encontrada.</h1><p><a href='../index.html'>Voltar para a Home</a></p>";
            }
        });
    </script>
</body>
</html>
